name: 🐛 Bug report
description: Something is broken or behaves wrong
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Before you continue, please:
        - Check the [FAQ](https://github.com/eugeniughelbur/obsidian-second-brain#faq) — many issues are answered there.
        - Search [open + closed issues](https://github.com/eugeniughelbur/obsidian-second-brain/issues?q=is%3Aissue) — someone may have hit the same bug.

  - type: dropdown
    id: command
    attributes:
      label: Which command broke?
      description: If multiple, file separate issues.
      options:
        - "/obsidian-save"
        - "/obsidian-daily"
        - "/obsidian-log"
        - "/obsidian-task"
        - "/obsidian-person"
        - "/obsidian-decide"
        - "/obsidian-capture"
        - "/obsidian-find"
        - "/obsidian-recap"
        - "/obsidian-review"
        - "/obsidian-board"
        - "/obsidian-project"
        - "/obsidian-health"
        - "/obsidian-init"
        - "/obsidian-ingest"
        - "/obsidian-synthesize"
        - "/obsidian-reconcile"
        - "/obsidian-export"
        - "/obsidian-adr"
        - "/obsidian-visualize"
        - "/obsidian-learn"
        - "/obsidian-challenge"
        - "/obsidian-emerge"
        - "/obsidian-connect"
        - "/obsidian-graduate"
        - "/obsidian-world"
        - Background agent (PostCompact hook)
        - Scheduled agent (morning / nightly / weekly / health)
        - install.sh
        - Other / not sure
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you run, and what went wrong?
      placeholder: |
        I ran `/obsidian-daily`. The note was created but the overdue tasks
        section was empty even though I have open tasks on the board.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: The daily note should list my overdue tasks pulled from the kanban board.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Exact commands and inputs. The more specific, the faster the fix.
      placeholder: |
        1. Pull latest main (commit hash)
        2. Restart Claude Code
        3. Run `/obsidian-daily`
        4. See error
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Skill version (release tag or commit SHA)
      placeholder: "v0.10.0 or 3d748cf"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / error output
      description: Paste error messages, stack traces, or hook log entries (e.g. /tmp/obsidian-bg-agent.log) if relevant.
      render: shell

  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: I checked the FAQ in the README
          required: true
        - label: I searched existing issues
          required: true
        - label: I'm running the latest release or main branch
          required: true
